<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi WhatsApp API - Panel de Administración</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      color: #555;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .instances-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .instance-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      border: 2px solid #e0e0e0;
    }

    .instance-card.connected {
      border-color: #28a745;
      background: #f0fff4;
    }

    .instance-card.disconnected {
      border-color: #dc3545;
      background: #fff5f5;
    }

    .instance-card.pending {
      border-color: #ffc107;
      background: #fffbf0;
    }

    .instance-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .instance-name {
      font-weight: 600;
      color: #333;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-connected {
      background: #28a745;
      color: white;
    }

    .status-disconnected {
      background: #dc3545;
      color: white;
    }

    .status-pending {
      background: #ffc107;
      color: #333;
    }

    .instance-info {
      margin-bottom: 15px;
    }

    .instance-info p {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .qr-container {
      text-align: center;
      margin: 20px 0;
    }

    .qr-container img {
      max-width: 250px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .chats-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
      cursor: pointer;
      transition: background 0.3s;
    }

    .chat-item:hover {
      background: #f8f9fa;
    }

    .chat-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      margin-right: 15px;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 3px;
    }

    .chat-phone {
      font-size: 12px;
      color: #999;
    }

    .chat-preview {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .messages-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      margin-bottom: 15px;
      max-width: 70%;
    }

    .message.sent {
      margin-left: auto;
    }

    .message-bubble {
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 14px;
    }

    .message.received .message-bubble {
      background: #f0f0f0;
      color: #333;
      border-bottom-left-radius: 2px;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 2px;
    }

    .message-time {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 20px;
    }

    .tab {
      padding: 12px 24px;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .api-key-display {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      word-break: break-all;
      margin-top: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state h3 {
      margin-bottom: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📱 Mi WhatsApp API</h1>
      <p>Panel de administración - Conecta WhatsApp y automatiza con n8n</p>
    </div>

    <div class="card">
      <h2>➕ Crear Nueva Instancia</h2>
      <div class="form-group">
        <label>Nombre de la instancia</label>
        <input type="text" id="instanceName" placeholder="Mi WhatsApp Business">
      </div>
      <button class="btn btn-primary" onclick="createInstance()">Crear Instancia</button>
      <div id="createResult"></div>
    </div>

    <div class="card">
      <h2>📋 Instancias</h2>
      <div class="instances-grid" id="instancesGrid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Cargando instancias...</p>
        </div>
      </div>
    </div>

    <div class="card" id="instanceDetails" style="display: none;">
      <div class="tabs">
        <button class="tab active" onclick="showTab('chats')">💬 Chats</button>
        <button class="tab" onclick="showTab('details')">ℹ️ Detalles</button>
        <button class="tab" onclick="showTab('webhook')">🔗 Webhook</button>
      </div>

      <div class="tab-content active" id="tab-chats">
        <h3>Conversaciones</h3>
        <div class="chats-list" id="chatsList">
          <div class="empty-state">
            <h3>Selecciona una instancia</h3>
            <p>Haz clic en una instancia para ver sus conversaciones</p>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-details">
        <div id="instanceDetailsContent"></div>
      </div>

      <div class="tab-content" id="tab-webhook">
        <h3>Configurar Webhook para n8n</h3>
        <div class="form-group">
          <label>URL del Webhook (n8n)</label>
          <input type="text" id="webhookUrl" placeholder="https://tu-n8n.com/webhook/xxxxx">
        </div>
        <div class="form-group">
          <label>Eventos a recibir</label>
          <select id="webhookEvents" multiple style="height: 100px;">
            <option value="message" selected>Mensajes recibidos</option>
            <option value="connection">Cambios de conexión</option>
            <option value="all">Todos los eventos</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="setWebhook()">Guardar Webhook</button>
        <div id="webhookResult"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    let currentInstanceId = null;
    let instances = [];

    // Cargar instancias al iniciar
    loadInstances();

    async function loadInstances() {
      try {
        const response = await fetch(`${API_URL}/instances`);
        const data = await response.json();
        
        if (data.success) {
          instances = data.data;
          renderInstances();
        }
      } catch (error) {
        console.error('Error cargando instancias:', error);
      }
    }

    function renderInstances() {
      const grid = document.getElementById('instancesGrid');
      
      if (instances.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>No hay instancias</h3>
            <p>Crea tu primera instancia de WhatsApp</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = instances.map(instance => `
        <div class="instance-card ${instance.status}" onclick="selectInstance('${instance.id}')">
          <div class="instance-header">
            <span class="instance-name">${instance.name}</span>
            <span class="status-badge status-${instance.status}">${instance.status}</span>
          </div>
          <div class="instance-info">
            <p>📱 ${instance.phone || 'Sin conectar'}</p>
            <p>🕐 Creado: ${new Date(instance.createdAt).toLocaleDateString()}</p>
          </div>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="event.stopPropagation(); showQR('${instance.id}')">📷 Ver QR</button>
            ${instance.status === 'connected' ? 
              `<button class="btn btn-danger" onclick="event.stopPropagation(); disconnectInstance('${instance.id}')">Desconectar</button>` : 
              `<button class="btn btn-success" onclick="event.stopPropagation(); showQR('${instance.id}')">Conectar</button>`
            }
          </div>
        </div>
      `).join('');
    }

    async function createInstance() {
      const name = document.getElementById('instanceName').value;
      if (!name) {
        showAlert('createResult', 'Por favor ingresa un nombre', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/instance/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showAlert('createResult', `Instancia creada. API Key: ${data.data.apiKey}`, 'success');
          document.getElementById('instanceName').value = '';
          loadInstances();
        } else {
          showAlert('createResult', data.error, 'error');
        }
      } catch (error) {
        showAlert('createResult', 'Error al crear instancia', 'error');
      }
    }

    function showAlert(elementId, message, type) {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => element.innerHTML = '', 10000);
    }

    async function selectInstance(instanceId) {
      currentInstanceId = instanceId;
      document.getElementById('instanceDetails').style.display = 'block';
      
      // Cargar detalles
      const instance = instances.find(i => i.id === instanceId);
      const detailsContent = document.getElementById('instanceDetailsContent');
      
      detailsContent.innerHTML = `
        <p><strong>Nombre:</strong> ${instance.name}</p>
        <p><strong>Teléfono:</strong> ${instance.phone || 'No conectado'}</p>
        <p><strong>Estado:</strong> ${instance.status}</p>
        <p><strong>API Key:</strong></p>
        <div class="api-key-display">${instance.apiKey || 'Consultar en base de datos'}</div>
      `;

      // Cargar chats
      loadChats(instanceId);
    }

    async function loadChats(instanceId) {
      const instance = instances.find(i => i.id === instanceId);
      const apiKey = instance?.apiKey;

      if (!apiKey) {
        document.getElementById('chatsList').innerHTML = '<div class="empty-state">API Key no disponible</div>';
        return;
      }

      try {
        const response = await fetch(`${API_URL}/chats/${instanceId}`, {
          headers: { 'x-api-key': apiKey }
        });
        const data = await response.json();

        if (data.success && data.data.length > 0) {
          document.getElementById('chatsList').innerHTML = data.data.map(chat => `
            <div class="chat-item" onclick="loadMessages('${instanceId}', '${chat.id}')">
              <div class="chat-avatar">${(chat.name || chat.phone || '?').charAt(0).toUpperCase()}</div>
              <div class="chat-info">
                <div class="chat-name">${chat.name || 'Sin nombre'}</div>
                <div class="chat-phone">${chat.phone}</div>
              </div>
              <div class="chat-preview">${chat.last_message || 'Sin mensajes'}</div>
            </div>
          `).join('');
        } else {
          document.getElementById('chatsList').innerHTML = '<div class="empty-state"><h3>Sin conversaciones</h3><p>Los chats aparecerán cuando lleguen mensajes</p></div>';
        }
      } catch (error) {
        console.error('Error cargando chats:', error);
      }
    }

    async function loadMessages(instanceId, chatId) {
      const instance = instances.find(i => i.id === instanceId);
      const apiKey = instance?.apiKey;

      try {
        const response = await fetch(`${API_URL}/messages/${instanceId}/${chatId}`, {
          headers: { 'x-api-key': apiKey }
        });
        const data = await response.json();

        if (data.success) {
          // Mostrar mensajes en un modal o sección
          alert('Mensajes cargados: ' + data.data.length + ' mensajes en esta conversación');
        }
      } catch (error) {
        console.error('Error cargando mensajes:', error);
      }
    }

    async function showQR(instanceId) {
      const instance = instances.find(i => i.id === instanceId);
      const apiKey = instance?.apiKey;

      if (!apiKey) {
        alert('API Key no disponible');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/instance/${instanceId}/qr`, {
          headers: { 'x-api-key': apiKey }
        });
        const data = await response.json();

        if (data.success && data.data.qr) {
          const qrWindow = window.open('', '_blank', 'width=400,height=400');
          qrWindow.document.write(`
            <html>
              <head><title>QR Code</title></head>
              <body style="display:flex;justify-content:center;align-items:center;height:100vh;margin:0;">
                <img src="${data.data.qr}" style="max-width:100%;">
              </body>
            </html>
          `);
        } else {
          alert('Estado: ' + data.data.status);
        }
      } catch (error) {
        console.error('Error obteniendo QR:', error);
      }
    }

    async function disconnectInstance(instanceId) {
      if (!confirm('¿Estás seguro de desconectar esta instancia?')) return;

      const instance = instances.find(i => i.id === instanceId);
      const apiKey = instance?.apiKey;

      try {
        await fetch(`${API_URL}/instance/${instanceId}/disconnect`, {
          method: 'POST',
          headers: { 'x-api-key': apiKey }
        });
        loadInstances();
      } catch (error) {
        console.error('Error desconectando:', error);
      }
    }

    function showTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    async function setWebhook() {
      const url = document.getElementById('webhookUrl').value;
      const eventsSelect = document.getElementById('webhookEvents');
      const events = Array.from(eventsSelect.selectedOptions).map(opt => opt.value);

      if (!url) {
        showAlert('webhookResult', 'Por favor ingresa una URL', 'error');
        return;
      }

      const instance = instances.find(i => i.id === currentInstanceId);

      try {
        const response = await fetch(`${API_URL}/webhook/set`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'x-api-key': instance?.apiKey
          },
          body: JSON.stringify({ 
            instanceId: currentInstanceId, 
            url, 
            events 
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showAlert('webhookResult', 'Webhook configurado correctamente', 'success');
        } else {
          showAlert('webhookResult', data.error, 'error');
        }
      } catch (error) {
        showAlert('webhookResult', 'Error configurando webhook', 'error');
      }
    }

    // Actualizar cada 10 segundos
    setInterval(loadInstances, 10000);
  </script>
</body>
</html>
